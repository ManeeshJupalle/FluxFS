name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Install Linux tray dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libxdo-dev

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --all-targets --bin flux

  release-build:
    name: Release binary size
    runs-on: ubuntu-latest
    needs: check

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install Linux tray dependencies
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libxdo-dev

      - name: cargo build --release
        run: cargo build --release --bins

      - name: Report binary sizes
        run: |
          ls -lh target/release/flux target/release/fluxfs target/release/fluxfs-tray
          echo "flux bytes:    $(wc -c < target/release/flux)"
          echo "fluxfs bytes: $(wc -c < target/release/fluxfs)"
          echo "tray bytes:   $(wc -c < target/release/fluxfs-tray)"

  release-linux:
    name: Package Linux (.deb + tarball)
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libxdo-dev

      - name: Build release binaries
        run: cargo build --release --bins

      - name: Install cargo-deb
        run: cargo install cargo-deb --locked

      - name: Build .deb package
        run: |
          chmod +x packaging/linux/debian/postinst packaging/linux/debian/prerm
          cargo deb --no-build
          mkdir -p dist
          cp target/debian/*.deb dist/
          tar czf dist/fluxfs-linux-x86_64.tar.gz -C target/release flux fluxfs fluxfs-tray

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fluxfs-linux-packages
          path: dist/*

  release-macos:
    name: Package macOS (.dmg + tarball)
    if: github.event_name == 'release'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build release binaries
        run: cargo build --release --bins

      - name: Build DMG
        run: |
          chmod +x packaging/macos/build-dmg.sh
          ./packaging/macos/build-dmg.sh

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fluxfs-macos-packages
          path: dist/*

  release-windows:
    name: Package Windows (setup.exe + zip)
    if: github.event_name == 'release'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build release binaries
        run: cargo build --release --bins

      - name: Install NSIS
        run: choco install nsis -y

      - name: Build installer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          & packaging/windows/build-installer.ps1 -SkipBuild
          Compress-Archive -Path target/release/flux.exe,target/release/fluxfs.exe,target/release/fluxfs-tray.exe -DestinationPath dist/fluxfs-windows-x86_64.zip

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fluxfs-windows-packages
          path: dist/*

  release-publish:
    name: Publish GitHub Release assets
    if: github.event_name == 'release'
    needs: [release-linux, release-macos, release-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List release assets
        run: find artifacts -type f | sort

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
